<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Berhasil - Fortune Fest 2026</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(230,244,236,1) 0%, rgba(206,236,219,1) 100%);
            padding: 2rem;
            text-align: center;
        }
        .success-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            font-size: 5rem;
            color: var(--primary-green);
            margin-bottom: 1.5rem;
        }
        .success-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }
        .success-text {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="success-wrapper">
        <div class="success-card fade-in-up">
            <div class="success-icon">✨🎉</div>
            <h1 class="success-title">Pendaftaran Berhasil!</h1>
            <p class="success-text">
                Terima kasih telah mendaftar untuk acara <strong>Fortune Fest 2026</strong>. <br><br>
                Data Anda telah kami terima. Silakan cek Email atau WhatsApp Anda secara berkala untuk informasi tiket dan panduan acara selanjutnya.
            </p>
            <a href="index.html" class="btn btn-primary" style="width: 100%;">Kembali ke Beranda</a>
        </div>
    </div>

</body>
</html>
